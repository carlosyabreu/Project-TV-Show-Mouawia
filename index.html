<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Mouawia Elkhalifa</title>
    <link href="style.css" rel="stylesheet" />
  </head>

  <body>
    <header>
      <div class="search-controls">
        <!-- New: show selector -->
        <label for="show-select">Choose a show:</label>
        <select id="show-select">
          <option value="">-- Loading shows --</option>
        </select>

        <input type="text" id="search-input" placeholder="Search episodes..." />

        <select id="episode-select">
          <option value="">All Episodes</option>
        </select>

        <span id="episode-count"></span>
      </div>
    </header>

    <main id="root"></main>

    <footer>
      <p>
        Data provided by
        <a href="https://www.tvmaze.com/" target="_blank">TVMaze.com</a>
      </p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
